name: Django CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          # Generate coverage report for SonarCloud
          pip install pytest-cov
          export DJANGO_SETTINGS_MODULE=lookit.settings
          pytest --cov=. --cov-report=xml

      # - name: SonarCloud Scan
      #   uses: SonarSource/sonarcloud-github-action@master
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    needs: test-and-quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # Only push image on merges to main
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/django-app:${{ github.sha }}, ${{ secrets.DOCKERHUB_USERNAME }}/django-app:latest

  deploy-trigger:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Update Kubernetes Manifest
        run: |
          # Use 'sed' to update the image tag in your deployment file
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/lookit-app:${{ github.sha }}|g" lookit/deployment.yaml
          
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add lookit/deployment.yaml
          git commit -m "Deploy: update image to ${ { github.sha } }"
          git push
